spring.application.name=lms-backend
server.port=${SERVER_PORT:8080}
spring.devtools.restart.enabled=false

app.frontend.url=${APP_FRONTEND_URL:http://localhost:5173}

# MySQL configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/lms_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# File upload limits
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB
app.file.upload-dir=${APP_FILE_UPLOAD_DIR:uploads}

# Mail configuration
# Replace these with your LMS sender Gmail account details before testing OTP/email notifications.
# Use a Gmail App Password here, not the normal Gmail login password.
spring.mail.host=smtp.gmail.com
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# JWT configuration
app.jwt.secret=${APP_JWT_SECRET:change-me-to-a-long-random-secret-before-production}
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:86400000}
